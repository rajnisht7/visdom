name: PR Quality Check

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.pull_request.body || '';
            const pr = context.payload.pull_request.number;
            const BOT_MARKER = '<!-- pr-quality-check -->';

            const sections = [
              { heading: '## Description', min: 20 },
              { heading: '## Motivation and Context', min: 20 },
              { heading: '## How Has This Been Tested?', min: 30 },
            ];


            function getSections(text, heading) {
              const idx = text.indexOf(heading);
              if (idx === -1) return null;
              const after = text.slice(idx + heading.length);
              const nextSection = after.match(/\n##\s/);
              return after
                .slice(0, nextSection ? nextSection.index : undefined)
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            }

            const errors = [];

            for (const { heading, min } of sections) {
              const content = getSections(body, heading);
              const name = heading.replace('## ', '');

              if (!content) {
                errors.push(`- **${name}** is empty.`);
              } else if (content.length < min) {
                errors.push(`- **${name}** is too short (${content.length}/${min} chars minimum).`);
              }
            }

            const checkboxSections = [
              '## Types of changes',
              '## Checklist:',
            ];
            for (const heading of checkboxSections) {
              const content = getSections(body, heading);
              const name = heading.replace('## ', '');
              if (!content) {
                errors.push(`- **${name}** is empty.`);
              } else if ((content.match(/- \[x\]/gi) || []).length === 0) {
                errors.push(`- **${name}** — please tick at least one checkbox.`);
              }
            }

            if (errors.length === 0) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: pr,
                  name: 'blocked',
                });
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              core.info('All sections look good!');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr,
            });
            const prev = comments.find(c => c.body.includes(BOT_MARKER));
            if (prev) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: prev.id,
              });
            }



            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr,
              body: `${BOT_MARKER}\n**Please fix these sections before this PR can be reviewed:**\n\n${errors.join('\n')}\n\n`,
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr,
                labels: ['blocked'],
              });
            } catch (e) {
              if (e.status === 422) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name: 'blocked', color: 'ef4444',
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: pr,
                  labels: ['blocked'],
                });
              }
            }

            core.setFailed(`${errors.length} section(s) incomplete.`);
