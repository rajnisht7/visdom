version: "3.8"
services:
  visdom:
    build: .
    image: fossasia/visdom:latest
    ports:
      - "8097:8097"
    volumes:
      - visdom_data:/home/visdom/.visdom
    environment:
      - VISDOM_USERNAME=${VISDOM_USERNAME:-}
      - VISDOM_PASSWORD=${VISDOM_PASSWORD:-}
      - VISDOM_USE_ENV_CREDENTIALS=${VISDOM_USE_ENV_CREDENTIALS:-}
      - VISDOM_COOKIE=${VISDOM_COOKIE:-}
    restart: unless-stopped
    # To enable authentication use flag -enable_login
    # e.g. docker run -d -p 8097:8097 --env-file .env fossasia/visdom:latest -enable_login

volumes:
  visdom_data:
